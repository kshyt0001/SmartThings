<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SmartThings 바로가기</title>
</head>
<body>
<p id="msg">허브 주소 확인 중...</p>
<script>
var ST_CLIENT_ID     = 'a14aad4d-4853-4886-8c45-4c3d63046cc0';
var ST_CLIENT_SECRET = 'f5f56311ae36031309229c5b9833c0762691b2099a92800895c1664d94492c7794013a2c7da75dd12200b7aba45afc77f98c3e2698c4468b90109a2c746671d56eb89363de5a1dc814b8f0525b34666ae7a7bb8e3997b52416ba1840d5900d1aa7ec4f9c8222f4836a04e2f7e2939af984b6675a1149f26f9730d71cf12c65a0d355025163e412a423b7edd18ebc3cd7514d8510f568c0553ac8abe1cf8351501fd9aaf96696b7a16ed64fa91d0fe5acef0b2b8d04c1351adc9113c625f56639267af03664b9523e922ab7b739eb304e7093734d67e3aeadc953054ea9ec12ba567c98407bc377b6978b7aae829f745140f7b9a7d50b87dd5f984c3a4187d79d';
var ST_RELAY_URL = 'https://kshyt0001.github.io/SmartThings/st-relay/';

function getCookie(k) {
  var m = document.cookie.match('(^|;)\\s*' + k + '\\s*=\\s*([^;]+)');
  return m ? decodeURIComponent(m.pop()) : null;
}
function setCookie(k, v, days) {
  var e = new Date();
  e.setTime(e.getTime() + days * 86400000);
  document.cookie = k + '=' + encodeURIComponent(v) + ';expires=' + e.toUTCString() + ';path=/';
}

async function getToken() {
  var token = getCookie('st_access_token');
  if (token) return token;
  var refresh = getCookie('st_refresh_token');
  if (!refresh) return null;
  var res = await fetch('https://api.smartthings.com/oauth/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + btoa(ST_CLIENT_ID + ':' + ST_CLIENT_SECRET)
    },
    body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh }).toString()
  });
  if (!res.ok) return null;
  var data = await res.json();
  var expiry = Date.now() + data.expires_in * 1000;
  setCookie('st_access_token',  data.access_token,  1);
  setCookie('st_refresh_token', data.refresh_token, 60);
  setCookie('st_token_expiry',  String(expiry),      1);
  return data.access_token;
}

async function run() {
  var deviceId = new URLSearchParams(location.search).get('d');
  if (!deviceId) {
    document.getElementById('msg').textContent = '기기 ID가 없습니다. (?d=DEVICE_ID)';
    return;
  }

  var authUrl = 'https://api.smartthings.com/oauth/authorize' +
    '?client_id=' + ST_CLIENT_ID +
    '&scope=' + encodeURIComponent('r:devices:* x:devices:*') +
    '&response_type=code' +
    '&redirect_uri=' + encodeURIComponent(ST_RELAY_URL) +
    '&state=' + btoa(deviceId);

  function needAuth() {
    document.getElementById('msg').innerHTML =
      '인증이 필요합니다. <a href="' + authUrl + '">인증하러 가기</a>';
  }

  // st-relay에서 auth=1로 넘어온 경우 hash에서 토큰 추출 → 쿠키 저장
  if (new URLSearchParams(location.search).get('auth') === '1' && location.hash) {
    var h = new URLSearchParams(location.hash.slice(1));
    var at = h.get('sta'), rt = h.get('str'), ex = h.get('ste');
    if (at && rt) {
      setCookie('st_access_token',  at, 1);
      setCookie('st_refresh_token', rt, 60);
      setCookie('st_token_expiry',  ex || String(Date.now() + 86400000), 1);
    }
  }

  var token = await getToken();
  if (!token) { needAuth(); return; }

  async function fetchHubUrl(t) {
    return await fetch(
      'https://api.smartthings.com/v1/devices/' + deviceId +
      '/components/main/capabilities/happyspiky44008.http/status',
      { headers: { 'Authorization': 'Bearer ' + t } }
    );
  }

  var res = await fetchHubUrl(token);
  if (res.status === 401) {
    document.cookie = 'st_access_token=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
    token = await getToken();
    if (!token) { needAuth(); return; }
    res = await fetchHubUrl(token);
  }
  if (res.status === 401) { needAuth(); return; }
  if (!res.ok) {
    document.getElementById('msg').textContent = '허브 주소 조회 실패: ' + res.status;
    return;
  }

  var data = await res.json();
  var hubUrl = data.info && data.info.value;
  if (!hubUrl) {
    document.getElementById('msg').textContent = '허브가 오프라인 상태입니다.';
    return;
  }

  // 항상 토큰을 hash로 전달 → 포트 변경 시에도 localStorage 갱신됨
  var rt2 = getCookie('st_refresh_token');
  var ex2 = getCookie('st_token_expiry') || String(Date.now() + 86400000);
  var hash = token && rt2
    ? '#sta=' + encodeURIComponent(token) +
      '&str=' + encodeURIComponent(rt2) +
      '&ste=' + encodeURIComponent(ex2)
    : '';

  window.location.href = hubUrl + hash;
}
run();
</script>
</body>
</html>
