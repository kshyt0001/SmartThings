<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>SmartThings OAuth Relay</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-8WS0QEBFDW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-8WS0QEBFDW');
</script>
</head>
<body>
<p id="msg">인증 처리 중...</p>
<script>
var ST_CLIENT_ID     = 'e75bf91d-fb90-47e1-8765-3503e2f5aedd';
var ST_CLIENT_SECRET = 'a7c0140304f92d63ff7420db6b218a54a1ffe93e0aa03a41a975165ddcfa9c80e6538f1bc502c539525b12f2333cef894d3cc254aef74db0439a464bd6dde7587f4ebd889f247e2a5d5e5f6c55a0b18bf95c78352b30cf8f77f80add56429597a58b3fab1a37f7b8408b1e58325d0d8f01886e6050b55c2c183550bea665741f43d54aa4f87df96fed1ecd48301873cc9e1d655b4f2edcffd68fb81edffca52535990841ca6cf29ce21053310a4bd2992f2134ef071573400d6199050b395cfc92f4c78480340cffaa7855e78e2355f236d3aed551869483c986deacb93b8eeeb116c77781c3e9c802da22b1e3cbae2f2c8fadfac8662bb3db120ba9f9661d49';
var REDIRECT_URI     = location.origin + location.pathname;

async function run() {
  var p = new URLSearchParams(location.search);
  var code = p.get('code');
  if (!code) { document.getElementById('msg').textContent = '인증 완료. 이 창을 닫아.'; return; }

  var deviceId = null;
  try { deviceId = atob(p.get('state') || ''); } catch(e) {}

  // 코드 → 토큰 교환
  var res = await fetch('https://api.smartthings.com/oauth/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + btoa(ST_CLIENT_ID + ':' + ST_CLIENT_SECRET)
    },
    body: new URLSearchParams({ grant_type:'authorization_code', code:code, redirect_uri:REDIRECT_URI }).toString()
  });
  if (!res.ok) { document.getElementById('msg').textContent = '토큰 교환 실패: ' + res.status; return; }
  var data = await res.json();

  var expiry = Date.now() + data.expires_in * 1000;

  // GitHub Pages 쿠키 저장 (hub 페이지 일반 접속용)
  function setCookie(k, v, days) {
    var e = new Date();
    e.setTime(e.getTime() + days * 86400000);
    document.cookie = k + '=' + encodeURIComponent(v) + ';expires=' + e.toUTCString() + ';path=/';
  }
  setCookie('st_access_token',  data.access_token,  1);
  setCookie('st_refresh_token', data.refresh_token, 60);
  setCookie('st_token_expiry',  String(expiry),      1);

  if (!deviceId) { document.getElementById('msg').textContent = '인증 완료. 이 창을 닫아.'; return; }

  // hub 페이지로 이동, 토큰을 hash로 전달 (iOS ITP 우회)
  window.location.href = 'https://kshyt0001.github.io/SmartThings/hub/?d=' +
    encodeURIComponent(deviceId) + '&auth=1' +
    '#sta=' + encodeURIComponent(data.access_token) +
    '&str=' + encodeURIComponent(data.refresh_token) +
    '&ste=' + encodeURIComponent(String(expiry));
}
run();
</script>
</body></html>
